spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: never

llm:
  provider: openai-compatible
  base-url: https://api.openai.com/v1
  api-key: test-key
  model-name: gpt-4o-mini
  temperature: 0.3
  max-tokens: 100
  timeout-seconds: 10
  log-requests: false
  log-responses: false

langchain4j:
  chat-memory:
    max-messages: 5
  rag:
    max-results: 1

pgvector:
  host: localhost
  port: 5432
  database: test_db
  user: postgres
  password: postgres
  table: report_embeddings
  dimension: 384

jira:
  base-url: https://test.atlassian.net
  username: test@example.com
  api-token: test-token

git:
  default-repo-path: ./

logging:
  level:
    com.topsion.easy_daily_report: WARN
    dev.langchain4j: WARN
