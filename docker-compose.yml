version: '3.8'

services:
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: daily-report-pgvector
    environment:
      POSTGRES_DB: daily_report
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data

volumes:
  pgvector_data:
